name: Sync ShellCrash YAML

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  pull_request:
    paths:
      - ".github/workflows/sync-shellcrash-yaml.yml"
      - "scripts/sync_yaml.py"
      - "tests/test_sync_yaml.py"
      - "generated/DustinWin_RS_Full_NoAds.yaml"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python3 -m unittest tests.test_sync_yaml -v

      - name: Generate YAML
        run: python3 scripts/sync_yaml.py

      - name: Verify generated file is current
        run: python3 scripts/sync_yaml.py --check

      - name: Commit changes
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- generated/DustinWin_RS_Full_NoAds.yaml; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/DustinWin_RS_Full_NoAds.yaml
          git commit -m "chore: sync upstream yaml"
          git push
